fragment PipelineFields on Pipeline {
    id
    pipelineUuid: uuid
    allowRebuilds
    badgeURL
    # @genqlient(pointer: true)
    branchConfiguration
    cancelIntermediateBuilds
    cancelIntermediateBuildsBranchFilter
    cluster {
        # @genqlient(pointer: true)
        id
        # @genqlient(pointer: true)
        name
    }
    # @genqlient(pointer: true)
    color
    defaultBranch
    # @genqlient(pointer: true)
    defaultTimeoutInMinutes
    # @genqlient(pointer: true)
    emoji
    # @genqlient(pointer: true)
    maximumTimeoutInMinutes
    description
    name
    repository {
        url
    }
    pipelineTemplate {
        # @genqlient(pointer: true)
        id
    }
    skipIntermediateBuilds
    skipIntermediateBuildsBranchFilter
    slug
    steps {
        yaml
    }
    tags {
        label
    }
    teams(first: 5, order: NAME) {
        ...PipelineTeam
    }
    archived
    visibility
    webhookURL
}

# Repository provider settings are intentionally kept OUT of PipelineFields: that fragment is
# used by getNode (the generic node read shared with other resources) and the create/update
# mutations, and the provider settings subtree can error server-side for some pipelines. Fetching
# it only via this dedicated fragment/query keeps unrelated reads (e.g. pipeline_team) unaffected.
fragment RepositoryProviderSettingsFields on Repository {
    provider {
        __typename
        ... on RepositoryProviderGithub {
            settings {
                # @genqlient(pointer: true)
                buildBranches
                # @genqlient(pointer: true)
                buildCheckRunCompleted
                # @genqlient(pointer: true)
                buildCreateEvent
                # @genqlient(pointer: true)
                buildDeploymentStatusCreated
                # @genqlient(pointer: true)
                buildPullRequestConvertedToDraft
                # @genqlient(pointer: true)
                buildPullRequestReviewRequested
                # @genqlient(pointer: true)
                buildPullRequestReviewDismissed
                # @genqlient(pointer: true)
                buildPullRequestReviewSubmitted
                # @genqlient(pointer: true)
                buildReleaseCreated
                # @genqlient(pointer: true)
                buildReleasePublished
                # @genqlient(pointer: true)
                buildReleaseReleased
                # @genqlient(pointer: true)
                buildIssueCommentCreated
                # @genqlient(pointer: true)
                buildMergeGroupChecksRequested
                # @genqlient(pointer: true)
                buildPullRequestBaseBranchChanged
                # @genqlient(pointer: true)
                buildPullRequestForks
                # @genqlient(pointer: true)
                buildPullRequestLabelsChanged
                # @genqlient(pointer: true)
                buildPullRequestMergeCommits
                # @genqlient(pointer: true)
                buildPullRequestReadyForReview
                # @genqlient(pointer: true)
                buildPullRequests
                # @genqlient(pointer: true)
                buildTags
                # @genqlient(pointer: true)
                cancelDeletedBranchBuilds
                # @genqlient(pointer: true)
                cancelWhenMergeGroupDestroyed
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
                # @genqlient(pointer: true)
                ignoreDefaultBranchPullRequests
                # @genqlient(pointer: true)
                issueCommentCommandWord
                # @genqlient(pointer: true)
                issueCommentMatchMode
                # @genqlient(pointer: true)
                prefixPullRequestForkBranchNames
                # @genqlient(pointer: true)
                publishBlockedAsPending
                # @genqlient(pointer: true)
                publishCommitStatus
                # @genqlient(pointer: true)
                publishCommitStatusPerStep
                # @genqlient(pointer: true)
                pullRequestBranchFilterConfiguration
                # @genqlient(pointer: true)
                pullRequestBranchFilterEnabled
                # @genqlient(pointer: true)
                separatePullRequestStatuses
                # @genqlient(pointer: true)
                skipBuildsForExistingCommits
                # @genqlient(pointer: true)
                skipPullRequestBuildsForExistingCommits
                # @genqlient(pointer: true)
                triggerMode
                # @genqlient(pointer: true)
                useMergeGroupBaseCommitForGitDiffBase
                # @genqlient(pointer: true)
                useStepKeyAsCommitStatus
            }
        }
        ... on RepositoryProviderGithubEnterprise {
            settings {
                # @genqlient(pointer: true)
                buildBranches
                # @genqlient(pointer: true)
                buildCheckRunCompleted
                # @genqlient(pointer: true)
                buildCreateEvent
                # @genqlient(pointer: true)
                buildDeploymentStatusCreated
                # @genqlient(pointer: true)
                buildPullRequestConvertedToDraft
                # @genqlient(pointer: true)
                buildPullRequestReviewRequested
                # @genqlient(pointer: true)
                buildPullRequestReviewDismissed
                # @genqlient(pointer: true)
                buildPullRequestReviewSubmitted
                # @genqlient(pointer: true)
                buildReleaseCreated
                # @genqlient(pointer: true)
                buildReleasePublished
                # @genqlient(pointer: true)
                buildReleaseReleased
                # @genqlient(pointer: true)
                buildIssueCommentCreated
                # @genqlient(pointer: true)
                buildMergeGroupChecksRequested
                # @genqlient(pointer: true)
                buildPullRequestBaseBranchChanged
                # @genqlient(pointer: true)
                buildPullRequestForks
                # @genqlient(pointer: true)
                buildPullRequestLabelsChanged
                # @genqlient(pointer: true)
                buildPullRequestMergeCommits
                # @genqlient(pointer: true)
                buildPullRequestReadyForReview
                # @genqlient(pointer: true)
                buildPullRequests
                # @genqlient(pointer: true)
                buildTags
                # @genqlient(pointer: true)
                cancelDeletedBranchBuilds
                # @genqlient(pointer: true)
                cancelWhenMergeGroupDestroyed
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
                # @genqlient(pointer: true)
                ignoreDefaultBranchPullRequests
                # @genqlient(pointer: true)
                issueCommentCommandWord
                # @genqlient(pointer: true)
                issueCommentMatchMode
                # @genqlient(pointer: true)
                prefixPullRequestForkBranchNames
                # @genqlient(pointer: true)
                publishBlockedAsPending
                # @genqlient(pointer: true)
                publishCommitStatus
                # @genqlient(pointer: true)
                publishCommitStatusPerStep
                # @genqlient(pointer: true)
                pullRequestBranchFilterConfiguration
                # @genqlient(pointer: true)
                pullRequestBranchFilterEnabled
                # @genqlient(pointer: true)
                separatePullRequestStatuses
                # @genqlient(pointer: true)
                skipBuildsForExistingCommits
                # @genqlient(pointer: true)
                skipPullRequestBuildsForExistingCommits
                # @genqlient(pointer: true)
                triggerMode
                # @genqlient(pointer: true)
                useMergeGroupBaseCommitForGitDiffBase
                # @genqlient(pointer: true)
                useStepKeyAsCommitStatus
            }
        }
        ... on RepositoryProviderBitbucket {
            settings {
                # @genqlient(pointer: true)
                buildBranches
                # @genqlient(pointer: true)
                buildPullRequests
                # @genqlient(pointer: true)
                buildTags
                # aliased: Bitbucket's nullable Boolean conflicts with GitHub's Boolean! under the
                # same response key, so give it a distinct key for the union field merge to validate.
                # @genqlient(pointer: true)
                canceldeletedbranchbuilds: cancelDeletedBranchBuilds
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
                # @genqlient(pointer: true)
                ignoreDefaultBranchPullRequests
                # @genqlient(pointer: true)
                publishCommitStatus
                # @genqlient(pointer: true)
                publishCommitStatusPerStep
                # @genqlient(pointer: true)
                pullRequestBranchFilterConfiguration
                # @genqlient(pointer: true)
                pullRequestBranchFilterEnabled
                # aliased for the same nullability-conflict reason as canceldeletedbranchbuilds.
                # @genqlient(pointer: true)
                skipbuildsforexistingcommits: skipBuildsForExistingCommits
                # @genqlient(pointer: true)
                skipPullRequestBuildsForExistingCommits
            }
        }
        ... on RepositoryProviderBitbucketServer {
            settings {
                # @genqlient(pointer: true)
                buildBranches
                # @genqlient(pointer: true)
                buildPullRequests
                # @genqlient(pointer: true)
                buildTags
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
            }
        }
        ... on RepositoryProviderGitlab {
            settings {
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
            }
        }
        ... on RepositoryProviderBeanstalk {
            settings {
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
            }
        }
        ... on RepositoryProviderCodebase {
            settings {
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
            }
        }
        ... on RepositoryProviderUnknown {
            settings {
                # @genqlient(pointer: true)
                filterCondition
                # @genqlient(pointer: true)
                filterEnabled
            }
        }
    }
}

fragment PipelineTeam on TeamPipelineConnection {
    pageInfo {
        endCursor
        hasNextPage
    }
    count
    edges {
        cursor
        node {
            id
            accessLevel
            team {
                id
            }
        }
    }
}

query getPipeline($slug: ID!) {
    pipeline(slug: $slug) {
        ...PipelineFields
    }
}

# Dedicated read for repository provider settings, used only by the pipeline resource's Read when
# provider_settings is configured. Kept separate from PipelineFields so the provider subtree is not
# requested on every pipeline read (which would couple unrelated reads to its resolution).
query getPipelineProviderSettings($id: ID!) {
    node(id: $id) {
        ... on Pipeline {
            id
            repository {
                ...RepositoryProviderSettingsFields
            }
        }
    }
}

query getPipelineTeams($slug: ID!, $cursor: String) {
    pipeline(slug: $slug) {
        teams(order: NAME, first: 50, after: $cursor) {
            ...PipelineTeam
        }
    }
}

# @genqlient(for: "PipelineCreateInput.branchConfiguration", pointer: true)
# @genqlient(for: "PipelineCreateInput.clusterId", pointer: true)
# @genqlient(for: "PipelineCreateInput.color", pointer: true)
# @genqlient(for: "PipelineCreateInput.emoji", pointer: true)
# @genqlient(for: "PipelineCreateInput.nextBuildNumber", omitempty: true)
# @genqlient(for: "PipelineCreateInput.pipelineTemplateId", omitempty: true)
# @genqlient(for: "PipelineCreateInput.visibility", omitempty: true)
# @genqlient(for: "PipelineCreateInput.defaultTimeoutInMinutes", pointer: true)
# @genqlient(for: "PipelineCreateInput.maximumTimeoutInMinutes", pointer: true)
mutation createPipeline(
    $input: PipelineCreateInput!
) {
    pipelineCreate(input: $input) {
        pipeline {
            ...PipelineFields
        }
    }
}

# @genqlient(for: "PipelineUpdateInput.clusterId", pointer: true)
# @genqlient(for: "PipelineUpdateInput.color", pointer: true)
# @genqlient(for: "PipelineUpdateInput.emoji", pointer: true)
# @genqlient(for: "PipelineUpdateInput.visibility", omitempty: true)
# @genqlient(for: "PipelineUpdateInput.branchConfiguration", pointer:true)
# @genqlient(for: "PipelineUpdateInput.pipelineTemplateId", pointer: true)
# @genqlient(for: "PipelineUpdateInput.archived", omitempty: true)
# @genqlient(for: "PipelineUpdateInput.nextBuildNumber", omitempty: true)
# @genqlient(for: "PipelineUpdateInput.defaultTimeoutInMinutes", pointer: true)
# @genqlient(for: "PipelineUpdateInput.maximumTimeoutInMinutes", pointer: true)
mutation updatePipeline(
    $input: PipelineUpdateInput!
) {
    pipelineUpdate(input: $input) {
        pipeline {
            ...PipelineFields
        }
    }
}

mutation deletePipeline ($id: ID!) {
    pipelineDelete(input: {
        id: $id
    }) {
        clientMutationId
    }
}

mutation archivePipeline ($id: ID!) {
  pipelineArchive(input:{
    id: $id
  }) {
    clientMutationId
  }
}

mutation unarchivePipeline ($id: ID!) {
  pipelineUnarchive(input:{
    id: $id
  }) {
    clientMutationId
  }
}
